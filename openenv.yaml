spec_version: 1
name: email-triage-env
version: "1.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  AI Email Triage & Response Environment that classifies emails,
  assigns priority, and generates replies.

metadata:
  author: Abhilash Maguluri
  license: MIT
  tags:
    - email
    - triage
    - classification
    - nlp

entry_point: env.environment:EmailTriageEnv

environment:
  action_space:
    type: discrete
    actions:
      - classify_email
      - set_priority
      - generate_reply
  observation_space:
    type: dict
    fields:
      email:
        type: string
        description: Raw email body text
      category:
        type: string
        enum: [complaint, query, request]
        nullable: true
      priority:
        type: string
        enum: [high, medium, low]
        nullable: true
      reply:
        type: string
        nullable: true
  max_steps: 10
  max_reward: 1.0

tasks:
  - id: email-task-001
    entry_point: tasks.tasks:generated_task_1
    grader: tasks.tasks:generated_grader_1
    description: Dynamically generated email triage task with a guaranteed grader binding.
    scoring:
      label: 1.0

  - id: email-task-002
    entry_point: tasks.tasks:generated_task_2
    grader: tasks.tasks:generated_grader_2
    description: Dynamically generated email triage task with a guaranteed grader binding.
    scoring:
      label: 1.0

  - id: email-task-003
    entry_point: tasks.tasks:generated_task_3
    grader: tasks.tasks:generated_grader_3
    description: Dynamically generated email triage task with a guaranteed grader binding.
    scoring:
      label: 1.0

  - id: email-task-004
    entry_point: tasks.tasks:generated_task_4
    grader: tasks.tasks:generated_grader_4
    description: Dynamically generated email triage task with a guaranteed grader binding.
    scoring:
      label: 1.0

  - id: email-task-005
    entry_point: tasks.tasks:generated_task_5
    grader: tasks.tasks:generated_grader_5
    description: Dynamically generated email triage task with a guaranteed grader binding.
    scoring:
      label: 1.0

build:
  dockerfile: Dockerfile
  requirements: requirements.txt

deploy:
  port: 7860
  healthcheck: /health
