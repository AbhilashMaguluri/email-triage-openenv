spec_version: 1
name: email-triage-env
version: "1.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  AI Email Triage & Response Environment that classifies emails,
  assigns priority, and generates replies.

metadata:
  author: Abhilash Maguluri
  license: MIT
  tags:
    - email
    - triage
    - classification
    - nlp

entry_point: env.environment:EmailTriageEnv

environment:
  action_space:
    type: discrete
    actions:
      - classify_email
      - set_priority
      - generate_reply
  observation_space:
    type: dict
    fields:
      email:
        type: string
        description: Raw email body text
      category:
        type: string
        enum: [complaint, query, request]
        nullable: true
      priority:
        type: string
        enum: [high, medium, low]
        nullable: true
      reply:
        type: string
        nullable: true
  max_steps: 10
  max_reward: 1.0

tasks:
  - id: easy
    entry_point: tasks.tasks:easy_task
    grader: tasks.tasks:easy_grader
    description: Classify a single email into the correct category.
    scoring:
      category: 1.0

  - id: medium
    entry_point: tasks.tasks:medium_task
    grader: tasks.tasks:medium_grader
    description: Classify an email and assign the correct priority.
    scoring:
      category: 0.5
      priority: 0.5

  - id: hard
    entry_point: tasks.tasks:hard_task
    grader: tasks.tasks:hard_grader
    description: Full triage pipeline - classify, prioritize, and reply.
    scoring:
      category: 0.4
      priority: 0.3
      reply: 0.3

build:
  dockerfile: Dockerfile
  requirements: requirements.txt

deploy:
  port: 7860
  healthcheck: /health
